<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 500px; margin: 80px auto; padding: 0 20px; color: #333; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        h2 { text-align: center; margin-bottom: 24px; color: #2c3e50; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; }
        input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 1em; box-sizing: border-box; }
        input[type="text"]:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,0.15); }
        .field-error { border-color: #e74c3c !important; }
        .error-msg { color: #e74c3c; font-size: 0.85em; margin-top: 5px; display: block; }
        .btn-submit { width: 100%; background: #4a90d9; color: white; border: none; padding: 12px; font-size: 1em; border-radius: 4px; cursor: pointer; margin-bottom: 8px; }
        .btn-submit:hover { background: #357abd; }
        .btn-cancel { display: block; width: 100%; text-align: center; padding: 10px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; box-sizing: border-box; }
        .btn-cancel:hover { background: #545b62; }
        .footer { text-align: center; margin-top: 32px; color: #e74c3c; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="card">
        <h2>카테고리 등록</h2>

        <form th:action="@{/categories/create}" method="post">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text"
                       id="name"
                       name="name"
                       th:value="${categoryName}"
                       th:classappend="${errorMessage != null} ? 'field-error'"
                       placeholder="카테고리 이름을 입력하세요" />
                <span class="error-msg" th:if="${errorMessage}" th:text="${errorMessage}">오류 메시지</span>
            </div>

            <button type="submit" class="btn-submit">등록</button>
            <a class="btn-cancel" th:href="@{/categories}">취소</a>
        </form>
    </div>

    <div class="footer">
        <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (EEE) a hh:mm:ss')}">날짜</p>
        <p>학번: 2171144 | 성명: 이정민</p>
    </div>

</body>
</html>
